<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>P2P Чат</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0a0a0f;
                background-image:
                    radial-gradient(
                        ellipse 80% 50% at 50% -20%,
                        rgba(59, 130, 246, 0.12),
                        transparent
                    ),
                    radial-gradient(
                        ellipse 60% 40% at 80% 100%,
                        rgba(99, 102, 241, 0.08),
                        transparent
                    );
                color: #e2e8f0;
                overflow: hidden;
                position: relative;
            }

            body::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
                opacity: 0.03;
                pointer-events: none;
            }

            .container {
                width: 100%;
                max-width: 480px;
                height: 90vh;
                max-height: 700px;
                border-radius: 24px;
                background: linear-gradient(
                    145deg,
                    rgba(22, 22, 35, 0.95),
                    rgba(15, 15, 24, 0.98)
                );
                border: 1px solid rgba(255, 255, 255, 0.06);
                box-shadow:
                    0 25px 50px -12px rgba(0, 0, 0, 0.6),
                    0 0 80px rgba(59, 130, 246, 0.08);
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* Header */
            .header {
                padding: 20px 24px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                display: flex;
                align-items: center;
                gap: 16px;
                backdrop-filter: blur(10px);
                background: rgba(15, 15, 25, 0.5);
            }

            .header-logo {
                width: 44px;
                height: 44px;
                background: linear-gradient(135deg, #3b82f6, #6366f1);
                border-radius: 14px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
                flex-shrink: 0;
            }

            .header-logo svg {
                width: 22px;
                height: 22px;
                stroke: #fff;
            }

            .header-info {
                flex: 1;
            }

            .header-title {
                font-size: 18px;
                font-weight: 600;
                color: #f8fafc;
                margin-bottom: 2px;
            }

            .header-subtitle {
                font-size: 12px;
                color: #64748b;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .status-dot {
                width: 6px;
                height: 6px;
                background: #22c55e;
                border-radius: 50%;
                animation: pulse-dot 2s infinite;
            }

            @keyframes pulse-dot {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }

            #lobby {
                display: flex;
                flex-direction: column;
                height: 100%;
                min-height: 0;
                background: linear-gradient(
                    145deg,
                    rgba(30, 30, 45, 0.9),
                    rgba(20, 20, 30, 0.95)
                );
            }

            /* Lobby Content */
            .lobby-content {
                flex: 1;
                padding: 24px;
                overflow: hidden;
                display: flex;
                background: linear-gradient(
                    145deg,
                    rgba(30, 30, 45, 0.9),
                    rgba(20, 20, 30, 0.95)
                );
                flex-direction: column;
                min-height: 0;
            }

            .lobby-content::-webkit-scrollbar {
                width: 4px;
            }

            .lobby-content::-webkit-scrollbar-track {
                background: transparent;
            }

            .lobby-content::-webkit-scrollbar-thumb {
                background: rgba(100, 116, 139, 0.3);
                border-radius: 4px;
            }

            /* Form Elements */
            .input-group {
                margin-bottom: 16px;
            }

            .input-label {
                font-size: 12px;
                font-weight: 500;
                color: #94a3b8;
                margin-bottom: 8px;
                display: block;
            }

            .input-field {
                width: 100%;
                padding: 14px 16px;
                border-radius: 12px;
                border: 1px solid rgba(100, 116, 139, 0.2);
                background: rgba(15, 15, 25, 0.6);
                color: #e2e8f0;
                font-size: 14px;
                transition: all 0.2s ease;
                outline: none;
            }

            .input-field::placeholder {
                color: #475569;
            }

            .input-field:focus {
                border-color: rgba(59, 130, 246, 0.5);
                background: rgba(15, 15, 25, 0.8);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            }

            .input-row {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
            }

            .input-row .input-field {
                flex: 1;
            }

            .btn-primary {
                padding: 14px 24px;
                border-radius: 12px;
                border: none;
                background: linear-gradient(135deg, #3b82f6, #6366f1);
                color: #fff;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
                white-space: nowrap;
            }

            .btn-primary:hover {
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
            }

            .btn-primary:active {
                transform: translateY(0);
            }

            /* Search */
            .search-wrapper {
                position: relative;
                margin-bottom: 20px;
            }

            .search-wrapper svg {
                position: absolute;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                stroke: #475569;
                pointer-events: none;
            }

            .search-input {
                width: 100%;
                padding: 12px 16px 12px 44px;
                border-radius: 12px;
                border: 1px solid rgba(100, 116, 139, 0.2);
                background: rgba(15, 15, 25, 0.6);
                color: #e2e8f0;
                font-size: 14px;
                transition: all 0.2s ease;
                outline: none;
            }

            .search-input::placeholder {
                color: #475569;
            }

            .search-input:focus {
                border-color: rgba(59, 130, 246, 0.5);
                background: rgba(15, 15, 25, 0.8);
            }

            /* Section */
            .section-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 16px;
            }

            .section-title {
                font-size: 14px;
                font-weight: 600;
                color: #94a3b8;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .section-badge {
                background: rgba(59, 130, 246, 0.15);
                color: #3b82f6;
                font-size: 12px;
                font-weight: 600;
                padding: 4px 10px;
                border-radius: 20px;
            }

            /* Room Cards */
            .rooms-list {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 10px;
                overflow-y: auto;
                min-height: 0;
            }

            .rooms-list::-webkit-scrollbar {
                width: 4px;
            }

            .rooms-list::-webkit-scrollbar-track {
                background: transparent;
            }

            .rooms-list::-webkit-scrollbar-thumb {
                background: rgba(100, 116, 139, 0.3);
                border-radius: 4px;
            }

            .room-card {
                background: rgba(30, 30, 45, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.04);
                border-radius: 14px;
                padding: 16px;
                display: flex;
                align-items: center;
                gap: 14px;
                transition: all 0.2s ease;
            }

            .room-card:hover {
                background: rgba(40, 40, 55, 0.6);
                border-color: rgba(59, 130, 246, 0.2);
            }

            .room-avatar {
                width: 48px;
                height: 48px;
                background: linear-gradient(
                    135deg,
                    rgba(59, 130, 246, 0.2),
                    rgba(99, 102, 241, 0.2)
                );
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }

            .room-avatar svg {
                width: 22px;
                height: 22px;
                stroke: #3b82f6;
            }

            .room-info {
                flex: 1;
                min-width: 0;
            }

            .room-name {
                font-size: 15px;
                font-weight: 600;
                color: #f1f5f9;
                margin-bottom: 4px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .room-meta {
                font-size: 12px;
                color: #64748b;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .room-meta svg {
                width: 12px;
                height: 12px;
                stroke: #64748b;
            }

            .btn-connect {
                padding: 10px 18px;
                border-radius: 10px;
                border: 1px solid rgba(59, 130, 246, 0.3);
                background: rgba(59, 130, 246, 0.1);
                color: #3b82f6;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                flex-shrink: 0;
            }

            .btn-connect:hover {
                background: rgba(59, 130, 246, 0.2);
                border-color: rgba(59, 130, 246, 0.5);
            }

            .empty-state {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                text-align: center;
            }

            .empty-icon {
                width: 64px;
                height: 64px;
                background: rgba(100, 116, 139, 0.1);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 16px;
            }

            .empty-icon svg {
                width: 28px;
                height: 28px;
                stroke: #475569;
            }

            .empty-title {
                font-size: 15px;
                font-weight: 600;
                color: #94a3b8;
                margin-bottom: 6px;
            }

            .empty-text {
                font-size: 13px;
                color: #64748b;
            }

            /* Chat View */
            #chat {
                display: none;
                flex-direction: column;
                height: 100%;
            }

            .chat-header {
                padding: 16px 20px;
                background: rgba(20, 20, 32, 0.8);
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                display: flex;
                align-items: center;
                gap: 14px;
                backdrop-filter: blur(10px);
            }

            .btn-back {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                border: 1px solid rgba(100, 116, 139, 0.3);
                background: rgba(30, 30, 45, 0.5);
                color: #94a3b8;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.2s ease;
                flex-shrink: 0;
            }

            .btn-back:hover {
                background: rgba(239, 68, 68, 0.1);
                border-color: rgba(239, 68, 68, 0.3);
            }

            .btn-back:hover svg {
                stroke: #ef4444;
            }

            .btn-back svg {
                width: 18px;
                height: 18px;
                stroke: #94a3b8;
                transition: stroke 0.2s ease;
            }

            .chat-peer {
                flex: 1;
            }

            .chat-peer-name {
                font-size: 16px;
                font-weight: 600;
                color: #f8fafc;
                margin-bottom: 2px;
            }

            .chat-peer-status {
                font-size: 12px;
                color: #22c55e;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .chat-peer-status .status-dot {
                width: 6px;
                height: 6px;
            }

            /* Messages */
            .messages {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                background: linear-gradient(
                    145deg,
                    rgba(30, 30, 45, 0.9),
                    rgba(20, 20, 30, 0.95)
                );
                flex-direction: column;
                gap: 8px;
            }

            .messages::-webkit-scrollbar {
                width: 4px;
            }

            .messages::-webkit-scrollbar-track {
                background: transparent;
            }

            .messages::-webkit-scrollbar-thumb {
                background: rgba(100, 116, 139, 0.3);
                border-radius: 4px;
            }

            .message {
                max-width: 80%;
                padding: 8px 8px;
                font-size: 14px;
                line-height: 1.4;
                animation: message-in 0.2s ease;
                position: relative;
            }

            @keyframes message-in {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .message.me {
                align-self: flex-end;
                background: linear-gradient(135deg, #3b82f6, #6366f1);
                color: #fff;
                border-radius: 18px 18px 6px 18px;
                box-shadow: 0 2px 10px rgba(59, 130, 246, 0.25);
            }

            .message.other {
                align-self: flex-start;
                background: rgba(45, 45, 60, 0.8);
                color: #e2e8f0;
                border-radius: 18px 18px 18px 6px;
                border: 1px solid rgba(255, 255, 255, 0.05);
            }

            .message-content {
                display: inline;
                word-wrap: break-word;
                word-break: break-word;
            }

            .message-time {
                font-size: 10px;
                opacity: 0.7;
                white-space: nowrap;
                margin-left: 10px;
                display: inline-flex;
                align-items: flex-end;
                float: right;
                margin-top: 4px;
                position: relative;
                top: 3px;
            }

            .message.me .message-time {
                color: rgba(255, 255, 255, 0.8);
            }

            .message.other .message-time {
                color: #64748b;
            }

            /* Message Input */
            .message-input-wrapper {
                padding: 12px 16px 12px 16px;
                background: rgba(20, 20, 32, 0.8);
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                display: flex;
                gap: 10px;
                align-items: flex-end;
                flex-shrink: 0;
                position: relative;
            }

            .btn-emoji {
                height: 44px;
                border-radius: 50%;
                border: none;
                background: transparent;
                color: #94a3b8;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.2s ease;
                flex-shrink: 0;
            }

            .btn-emoji:hover {
                color: #3b82f6;
            }

            .btn-emoji svg {
                width: 24px;
                height: 24px;
            }

            .emoji-picker {
                position: absolute;
                bottom: 70px;
                left: 16px;
                width: 342px;
                height: 284px;
                max-height: 380px;
                background: rgba(25, 25, 40, 0.98);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                z-index: 100;
                display: none;
                flex-direction: column;
                overflow: hidden;
            }

            .emoji-picker.show {
                display: flex;
            }

            .emoji-categories {
                display: flex;
                padding: 8px;
                gap: 4px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                overflow-x: auto;
                flex-shrink: 0;
            }

            .emoji-categories::-webkit-scrollbar {
                display: none;
            }

            .emoji-cat-btn {
                padding: 8px 12px;
                border-radius: 8px;
                border: none;
                background: transparent;
                color: #64748b;
                font-size: 11px;
                font-weight: 500;
                cursor: pointer;
                white-space: nowrap;
                transition: all 0.2s ease;
            }

            .emoji-cat-btn:hover {
                background: rgba(59, 130, 246, 0.1);
                color: #94a3b8;
            }

            .emoji-cat-btn.active {
                background: rgba(59, 130, 246, 0.2);
                color: #3b82f6;
            }

            .emoji-search {
                padding: 10px 12px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                flex-shrink: 0;
            }

            .emoji-search input {
                width: 100%;
                padding: 10px 14px;
                border-radius: 10px;
                border: 1px solid rgba(100, 116, 139, 0.2);
                background: rgba(15, 15, 25, 0.6);
                color: #e2e8f0;
                font-size: 13px;
                outline: none;
            }

            .emoji-search input::placeholder {
                color: #475569;
            }

            .emoji-search input:focus {
                border-color: rgba(59, 130, 246, 0.5);
            }

            .emoji-grid {
                flex: 1;
                overflow-y: auto;
                padding: 10px;
                display: grid;
                grid-template-columns: repeat(8, 1fr);
                gap: 2px;
            }

            .emoji-grid::-webkit-scrollbar {
                width: 4px;
            }

            .emoji-grid::-webkit-scrollbar-track {
                background: transparent;
            }

            .emoji-grid::-webkit-scrollbar-thumb {
                background: rgba(100, 116, 139, 0.3);
                border-radius: 4px;
            }

            .emoji-item {
                width: 100%;
                aspect-ratio: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.15s ease;
            }

            .emoji-item:hover {
                background: rgba(59, 130, 246, 0.2);
                transform: scale(1.15);
            }

            .message-input {
                flex: 1;
                padding: 12px 16px;
                border-radius: 22px;
                border: 1px solid rgba(100, 116, 139, 0.2);
                background: rgba(30, 30, 45, 0.6);
                color: #e2e8f0;
                font-size: 14px;
                font-family: inherit;
                outline: none;
                resize: none;
                min-height: 44px;
                max-height: 120px;
                line-height: 1.4;
                transition:
                    border-color 0.2s ease,
                    background 0.2s ease;
                overflow-y: auto;
                scrollbar-width: none;
            }

            .message-input::-webkit-scrollbar {
                width: 3px;
            }

            .message-input::-webkit-scrollbar-track {
                background: transparent;
            }

            .message-input::-webkit-scrollbar-thumb {
                background: rgba(100, 116, 139, 0.3);
                border-radius: 3px;
            }

            .message-input::placeholder {
                color: #475569;
            }

            .message-input:focus {
                border-color: rgba(59, 130, 246, 0.5);
                background: rgba(30, 30, 45, 0.8);
            }

            .btn-send {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                border: none;
                background: linear-gradient(135deg, #3b82f6, #6366f1);
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.2s ease;
                box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
                flex-shrink: 0;
            }

            .btn-send:hover {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            }

            .btn-send:active {
                transform: scale(0.95);
            }

            .btn-send svg {
                width: 20px;
                height: 20px;
                stroke: #fff;
                margin-left: 2px;
            }

            /* Call Button */
            .btn-call {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                border: 1px solid rgba(34, 197, 94, 0.3);
                background: rgba(34, 197, 94, 0.1);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.2s ease;
                flex-shrink: 0;
            }

            .btn-call:hover {
                background: rgba(34, 197, 94, 0.2);
                border-color: rgba(34, 197, 94, 0.5);
            }

            .btn-call svg {
                width: 20px;
                height: 20px;
                stroke: #22c55e;
            }

            .chat-status {
                text-align: center;
                font-size: 12px;
                color: #64748b;
                padding: 8px;
                background: rgba(20, 20, 32, 0.5);
            }

            /* System Messages */
            .system-message {
                align-self: center;
                background: rgba(100, 116, 139, 0.1);
                color: #64748b;
                font-size: 12px;
                padding: 8px 16px;
                border-radius: 20px;
                margin: 8px 0;
            }
            .nav-btn {
                position: fixed;
                top: 24px;
                left: 24px;
                padding: 12px 20px;
                font-size: 14px;
                font-weight: 500;
                border: 1px solid rgba(100, 116, 139, 0.3);
                border-radius: 12px;
                background: rgba(20, 20, 30, 0.9);
                color: #e2e8f0;
                cursor: pointer;
                transition: all 0.2s ease;
                display: flex;
                align-items: center;
                gap: 10px;
                z-index: 10;
                backdrop-filter: blur(10px);
            }

            .nav-btn:hover {
                background: rgba(34, 197, 94, 0.1);
                border-color: rgba(34, 197, 94, 0.4);
            }

            .nav-btn svg {
                width: 18px;
                height: 18px;
                stroke: #22c55e;
            }
        </style>
    </head>
    <body>
        <button class="nav-btn" id="navBtn">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                />
            </svg>
            P2P Передача файла
        </button>
        <div class="container" id="app">
            <!-- LOBBY -->
            <div id="lobby">
                <div class="header">
                    <div class="header-logo">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"

        <script>
            let ws,
                myClientId = "";
            let pendingRequest = false;

            function connectWebSocket() {
                const protocol =
                    location.protocol === "https:" ? "wss:" : "ws:";
                ws = new WebSocket(`${protocol}//${location.host}/chat/ws`);

                ws.onmessage = async (e) => {
                    const msg = JSON.parse(e.data);
                    console.log("📨 Получено сообщение:", msg.type, msg.data);

                    if (msg.type === "init") {
                        myClientId = msg.data.client_id;
                    } else if (msg.type === "users") {
                        renderUsers(msg.data);
                    } else if (msg.type === "incoming_request") {
                        // Создаём кастомный диалог вместо нативного confirm()
                        const dialog = document.createElement("div");
                        dialog.className = "custom-dialog-overlay";
                        dialog.innerHTML = `
        <div class="custom-dialog">
            <div class="dialog-title">Запрос на подключение</div>
            <div class="dialog-text">Пользователь <strong>${escapeHtml(msg.data.from_nickname)}</strong> хочет подключиться к вашему чату.</div>
            <div class="dialog-buttons">
                <button class="btn-dialog-reject">Отклонить</button>
                <button class="btn-dialog-accept">Принять</button>
            </div>
        </div>
    `;
                        document.body.appendChild(dialog);

                        function sendResponse(accepted) {
                            document.body.removeChild(dialog);
                            ws.send(
                                JSON.stringify({
                                    type: "request_response",
                                    data: {
                                        to: msg.data.from,
                                        accepted: accepted,
                                    },
                                }),
                            );
                        }

                        dialog.querySelector(".btn-dialog-accept").onclick =
                            () => sendResponse(true);
                        dialog.querySelector(".btn-dialog-reject").onclick =
                            () => sendResponse(false);

                        // Закрытие кликом вне диалога — НЕ отклоняем запрос
                        dialog.onclick = (e) => {
                            if (e.target === dialog) {
                                document.body.removeChild(dialog);
                                // Не отправляем ответ — запрос не будет отклонён ложно
                            }
                        };

                        // Стили для диалога (встраиваются один раз при первой загрузке)
                        if (!document.getElementById("dialog-styles")) {
                            const style = document.createElement("style");
                            style.id = "dialog-styles";
                            style.textContent = `
            .custom-dialog-overlay {
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0, 0, 0, 0.7);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
            }
            .custom-dialog {
                background: rgba(30, 30, 45, 0.95);
                border-radius: 16px;
                padding: 24px;
                width: 90%;
                max-width: 400px;
                text-align: center;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5),
                            0 0 40px rgba(59, 130, 246, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .dialog-title {
                font-size: 18px;
                font-weight: 600;
                color: #f1f5f9;
                margin-bottom: 12px;
            }
            .dialog-text {
                font-size: 14px;
                color: #94a3b8;
                margin-bottom: 24px;
                line-height: 1.5;
            }
            .dialog-buttons {
                display: flex;
                gap: 12px;
                justify-content: center;
            }
            .btn-dialog-reject,
            .btn-dialog-accept {
                flex: 1;
                padding: 12px;
                border-radius: 12px;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            .btn-dialog-reject {
                background: rgba(239, 68, 68, 0.1);
                color: #ef4444;
                border: 1px solid rgba(239, 68, 68, 0.3);
            }
            .btn-dialog-reject:hover {
                background: rgba(239, 68, 68, 0.2);
            }
            .btn-dialog-accept {
                background: linear-gradient(135deg, #3b82f6, #6366f1);
                color: white;
                border: none;
                box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            }
            .btn-dialog-accept:hover {
                transform: translateY(-1px);
                box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
            }
        `;
                            document.head.appendChild(style);
                        }
                    } else if (msg.type === "room_created") {
                        console.log("✅ Создатель → переключаемся в чат");
                        document.getElementById("lobby").style.display = "none";
                        document.getElementById("chat").style.display = "flex";
                        document.getElementById("chatTitle").textContent =
                            msg.data.title || "Мой чат";

                    } else if (msg.type === "start_connection") {

                        );
                        document.getElementById("lobby").style.display = "none";
                        document.getElementById("chat").style.display = "flex";
                        document.getElementById("chatTitle").textContent =
                            msg.data.peer_nickname || "Чат";
                        window.startChat(msg.data);
                    } else if (msg.type === "request_rejected") {
                        alert("Владелец комнаты отклонил ваш запрос.");
                        pendingRequest = false;
                    } else if (msg.type === "request_failed") {
                        alert(`Ошибка: ${msg.data.reason}`);
                        pendingRequest = false;
                    } else if (
                        [
                            "offer",
                            "answer",
                            "candidate",
                            "public_key",
                            "peer_disconnected",
                        ].includes(msg.type)
                    ) {
                        if (window.handleWebRTCMessage)
                            window.handleWebRTCMessage(msg);
                    }
                };

                ws.onclose = () => setTimeout(connectWebSocket, 2000);
                ws.onerror = (err) => console.error("WebSocket error:", err);
            }

            function setNickname() {
                const nick = document.getElementById("nickname").value.trim();
                if (ws)
                    ws.send(
                        JSON.stringify({
                            type: "set_nickname",
                            data: { nickname: nick },
                        }),
                    );
            }

            function createRoom() {
                const title = document.getElementById("roomTitle").value.trim();
                ws.send(
                    JSON.stringify({ type: "create_room", data: { title } }),
                );
                document.getElementById("roomTitle").value = "";
            }

            function connectToUser(targetId) {
                if (pendingRequest) {
                    alert("Подождите, предыдущий запрос ещё обрабатывается.");
                    return;
                }
                console.log("🔗 Клик по кнопке Войти →", targetId);
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    alert("Нет соединения с сервером. Обновите страницу.");
                    return;
                }
                pendingRequest = true;
                ws.send(
                    JSON.stringify({
                        type: "connect_request",
                        data: { target_id: targetId },
                    }),
                );
                setTimeout(() => {
                    pendingRequest = false;
                }, 10000);
            }

            function renderUsers(list) {
                document.getElementById("count").textContent = list.length;
                const container = document.getElementById("usersList");

                if (!list.length) {
                    container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155" />
                        </svg>
                    </div>
                    <div class="empty-title">Пока нет чатов</div>
                    <div class="empty-text">Создайте первый чат или дождитесь других</div>
                </div>
            `;
                    return;
                }

                container.innerHTML = list
                    .map(
                        (u) => `
            <div class="room-card">
                <div class="room-avatar">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
                    </svg>
                </div>
                <div class="room-info">
                    <div class="room-name">${escapeHtml(u.title)}</div>
                    <div class="room-meta">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                        </svg>
                        ${escapeHtml(u.nickname)}
                    </div>
                </div>
                <button class="btn-connect" onclick="connectToUser('${u.client_id}')">Войти</button>
            </div>
        `,
                    )
                    .join("");
            }

            function filterUsers() {
                const term = document
                    .getElementById("search")
                    .value.toLowerCase();
                document.querySelectorAll(".room-card").forEach((card) => {
                    card.style.display = card.textContent
                        .toLowerCase()
                        .includes(term)
                        ? ""
                        : "none";
                });
            }

            function escapeHtml(str) {
                const div = document.createElement("div");
                div.textContent = str;
                return div.innerHTML;
            }

            // Глобальные функции для доступа из HTML
            window.setNickname = setNickname;
            window.createRoom = createRoom;
            window.connectToUser = connectToUser;
            window.filterUsers = filterUsers;
            window.exitChat = function () {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: "peer_disconnected" }));
                }
                if (typeof window._exitChatInternal === "function") {
                    window._exitChatInternal();
                }
            };

            connectWebSocket();
        </script>

            const navBtn = document.getElementById("navBtn");
            navBtn.addEventListener("click", () => {
                const baseUrl =
                    "https://xhackerfinnx-file-transfer-036b.twc1.net/";
                window.open(baseUrl, "_blank");
            });
        </script>
