<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>P2P Скачивание файла</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0a0a0f;
                background-image:
                    radial-gradient(
                        ellipse 80% 50% at 50% -20%,
                        rgba(34, 197, 94, 0.12),
                        transparent
                    ),
                    radial-gradient(
                        ellipse 60% 40% at 80% 100%,
                        rgba(6, 182, 212, 0.08),
                        transparent
                    );
                color: #e2e8f0;
                overflow: hidden;
                position: relative;
            }

            body::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
                opacity: 0.03;
                pointer-events: none;
            }

            .container {
                width: 100%;
                max-width: 400px;
                padding: 48px 36px;
                border-radius: 24px;
                background: linear-gradient(
                    145deg,
                    rgba(30, 30, 45, 0.9),
                    rgba(20, 20, 30, 0.95)
                );
                border: 1px solid rgba(255, 255, 255, 0.06);
                box-shadow:
                    0 25px 50px -12px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(255, 255, 255, 0.03),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
                text-align: center;
                position: relative;
                z-index: 1;
            }

            .icon-wrapper {
                width: 72px;
                height: 72px;
                margin: 0 auto 24px;
                background: linear-gradient(
                    135deg,
                    rgba(34, 197, 94, 0.15),
                    rgba(6, 182, 212, 0.15)
                );
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
            }

            .icon-wrapper::before {
                content: "";
                position: absolute;
                inset: -3px;
                border-radius: 50%;
                background: linear-gradient(135deg, #22c55e, #06b6d4);
                opacity: 0.2;
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    transform: scale(1);
                    opacity: 0.2;
                }
                50% {
                    transform: scale(1.1);
                    opacity: 0.1;
                }
            }

            .icon-wrapper svg {
                width: 32px;
                height: 32px;
                stroke: #22c55e;
                position: relative;
                z-index: 1;
                animation: bounce 1.5s ease-in-out infinite;
            }

            @keyframes bounce {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(4px);
                }
            }

            h2 {
                font-size: 22px;
                font-weight: 600;
                margin: 0 0 8px;
                letter-spacing: -0.5px;
                color: #f8fafc;
            }

            .subtitle {
                font-size: 14px;
                color: #64748b;
                margin-bottom: 32px;
            }

            .progress {
                width: 100%;
                height: 8px;
                background: rgba(100, 116, 139, 0.15);
                border-radius: 9999px;
                overflow: hidden;
                position: relative;
            }

            .bar {
                height: 100%;
                width: 0%;
                background: linear-gradient(90deg, #22c55e, #06b6d4);
                border-radius: 9999px;
                transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
                position: relative;
            }

            .bar::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.3),
                    transparent
                );
                animation: shimmer 1.5s infinite;
            }

            @keyframes shimmer {
                0% {
                    transform: translateX(-100%);
                }
                100% {
                    transform: translateX(100%);
                }
            }

            #status {
                margin-top: 20px;
                font-size: 14px;
                color: #94a3b8;
                min-height: 24px;
            }

            .file-info {
                margin-top: 24px;
                padding: 16px;
                background: rgba(15, 15, 25, 0.6);
                border: 1px solid rgba(100, 116, 139, 0.15);
                border-radius: 12px;
                display: none;
            }

            .file-info.show {
                display: block;
            }

            .file-name {
                font-size: 14px;
                font-weight: 500;
                color: #e2e8f0;
                word-break: break-all;
            }

            .file-size {
                font-size: 12px;
                color: #64748b;
                margin-top: 4px;
            }

            .footer {
                margin-top: 36px;
                padding-top: 20px;
                border-top: 1px solid rgba(100, 116, 139, 0.12);
                display: flex;
                justify-content: center;
                gap: 24px;
            }

            .footer-item {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                color: #475569;
            }

            .footer-item svg {
                width: 14px;
                height: 14px;
                stroke: #22c55e;
            }

            .success-state .icon-wrapper {
                background: linear-gradient(
                    135deg,
                    rgba(34, 197, 94, 0.25),
                    rgba(34, 197, 94, 0.15)
                );
            }

            .success-state .icon-wrapper::before {
                background: #22c55e;
                animation: none;
            }

            .success-state .icon-wrapper svg {
                animation: none;
            }

            .error-state .icon-wrapper {
                background: linear-gradient(
                    135deg,
                    rgba(239, 68, 68, 0.25),
                    rgba(239, 68, 68, 0.15)
                );
            }

            .error-state .icon-wrapper::before {
                background: #ef4444;
                animation: none;
            }

            .error-state .icon-wrapper svg {
                stroke: #ef4444;
                animation: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="icon-wrapper">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
                    />
                </svg>
            </div>

            <h2>Загружаем файл</h2>
            <p class="subtitle">Установка P2P соединения...</p>

            <div class="progress">
                <div class="bar" id="bar"></div>
            </div>

            <p id="status">Ожидание файла...</p>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <div class="footer">
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                        />
                    </svg>
                    <span>P2P</span>
                </div>
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                        />
                    </svg>
                    <span>Шифрование</span>
                </div>
            </div>
        </div>

        <script src="receiver.js"></script>
    </body>
</html>
