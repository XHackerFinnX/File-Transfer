<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>P2P Скачивание файла</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0a0a0f;
                background-image:
                    radial-gradient(
                        ellipse 80% 50% at 50% -20%,
                        rgba(34, 197, 94, 0.12),
                        transparent
                    ),
                    radial-gradient(
                        ellipse 60% 40% at 80% 100%,
                        rgba(6, 182, 212, 0.08),
                        transparent
                    );
                color: #e2e8f0;
                overflow: hidden;
                position: relative;
            }

            body::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
                opacity: 0.03;
                pointer-events: none;
            }

            .container {
                width: 100%;
                max-width: 400px;
                padding: 48px 36px;
                border-radius: 24px;
                background: linear-gradient(
                    145deg,
                    rgba(30, 30, 45, 0.9),
                    rgba(20, 20, 30, 0.95)
                );
                border: 1px solid rgba(255, 255, 255, 0.06);
                box-shadow:
                    0 25px 50px -12px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(255, 255, 255, 0.03),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
                text-align: center;
                position: relative;
                z-index: 1;
            }

            .icon-wrapper {
                width: 72px;
                height: 72px;
                margin: 0 auto 24px;
                background: linear-gradient(
                    135deg,
                    rgba(34, 197, 94, 0.15),
                    rgba(6, 182, 212, 0.15)
                );
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
            }

            .icon-wrapper::before {
                content: "";
                position: absolute;
                inset: -3px;
                border-radius: 50%;
                background: linear-gradient(135deg, #22c55e, #06b6d4);
                opacity: 0.2;
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    transform: scale(1);
                    opacity: 0.2;
                }
                50% {
                    transform: scale(1.1);
                    opacity: 0.1;
                }
            }

            .icon-wrapper svg {
                width: 32px;
                height: 32px;
                stroke: #22c55e;
                position: relative;
                z-index: 1;
                animation: bounce 1.5s ease-in-out infinite;
            }

            @keyframes bounce {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(4px);
                }
            }

            h2 {
                font-size: 22px;
                font-weight: 600;
                margin: 0 0 8px;
                letter-spacing: -0.5px;
                color: #f8fafc;
            }

            .subtitle {
                font-size: 14px;
                color: #64748b;
                margin-bottom: 32px;
            }

            .progress {
                width: 100%;
                height: 8px;
                background: rgba(100, 116, 139, 0.15);
                border-radius: 9999px;
                overflow: hidden;
                position: relative;
            }

            .bar {
                height: 100%;
                width: 0%;
                background: linear-gradient(90deg, #22c55e, #06b6d4);
                border-radius: 9999px;
                transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
                position: relative;
            }

            .bar::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.3),
                    transparent
                );
                animation: shimmer 1.5s infinite;
            }

            @keyframes shimmer {
                0% {
                    transform: translateX(-100%);
                }
                100% {
                    transform: translateX(100%);
                }
            }

            #status {
                margin-top: 20px;
                font-size: 14px;
                color: #94a3b8;
                min-height: 24px;
            }

            .file-info {
                margin-top: 24px;
                padding: 16px;
                background: rgba(15, 15, 25, 0.6);
                border: 1px solid rgba(100, 116, 139, 0.15);
                border-radius: 12px;
                display: none;
            }

            .file-info.show {
                display: block;
            }

            .file-name {
                font-size: 14px;
                font-weight: 500;
                color: #e2e8f0;
                word-break: break-all;
            }

            .file-size {
                font-size: 12px;
                color: #64748b;
                margin-top: 4px;
            }

            .footer {
                margin-top: 36px;
                padding-top: 20px;
                border-top: 1px solid rgba(100, 116, 139, 0.12);
                display: flex;
                justify-content: center;
                gap: 24px;
            }

            .footer-item {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                color: #475569;
            }

            .footer-item svg {
                width: 14px;
                height: 14px;
                stroke: #22c55e;
            }

            .success-state .icon-wrapper {
                background: linear-gradient(
                    135deg,
                    rgba(34, 197, 94, 0.25),
                    rgba(34, 197, 94, 0.15)
                );
            }

            .success-state .icon-wrapper::before {
                background: #22c55e;
                animation: none;
            }

            .success-state .icon-wrapper svg {
                animation: none;
            }

            .error-state .icon-wrapper {
                background: linear-gradient(
                    135deg,
                    rgba(239, 68, 68, 0.25),
                    rgba(239, 68, 68, 0.15)
                );
            }

            .error-state .icon-wrapper::before {
                background: #ef4444;
                animation: none;
            }

            .error-state .icon-wrapper svg {
                stroke: #ef4444;
                animation: none;
            }
            .nav-btn {
                position: fixed;
                top: 24px;
                left: 24px;
                padding: 12px 20px;
                font-size: 14px;
                font-weight: 500;
                border: 1px solid rgba(100, 116, 139, 0.3);
                border-radius: 12px;
                background: rgba(20, 20, 30, 0.9);
                color: #e2e8f0;
                cursor: pointer;
                transition: all 0.2s ease;
                display: flex;
                align-items: center;
                gap: 10px;
                z-index: 10;
                backdrop-filter: blur(10px);
            }

            .nav-btn:hover {
                background: rgba(34, 197, 94, 0.1);
                border-color: rgba(34, 197, 94, 0.4);
            }

            .nav-btn svg {
                width: 18px;
                height: 18px;
                stroke: #22c55e;
            }

            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.7);
                backdrop-filter: blur(4px);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 100;
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }

            .modal-overlay.show {
                opacity: 1;
                visibility: visible;
            }

            .modal {
                width: 100%;
                max-width: 400px;
                margin: 20px;
                padding: 32px;
                border-radius: 20px;
                background: linear-gradient(
                    145deg,
                    rgba(30, 30, 45, 0.98),
                    rgba(20, 20, 30, 0.98)
                );
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow:
                    0 25px 50px -12px rgba(0, 0, 0, 0.6),
                    0 0 60px rgba(239, 68, 68, 0.1);
                text-align: center;
                transform: scale(0.9) translateY(20px);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .modal-overlay.show .modal {
                transform: scale(1) translateY(0);
            }

            .modal-icon {
                width: 64px;
                height: 64px;
                margin: 0 auto 20px;
                background: linear-gradient(
                    135deg,
                    rgba(239, 68, 68, 0.2),
                    rgba(239, 68, 68, 0.1)
                );
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .modal-icon svg {
                width: 28px;
                height: 28px;
                stroke: #ef4444;
            }

            .modal h3 {
                font-size: 18px;
                font-weight: 600;
                color: #f8fafc;
                margin-bottom: 8px;
            }

            .modal p {
                font-size: 14px;
                color: #94a3b8;
                margin-bottom: 28px;
                line-height: 1.5;
            }

            .modal-buttons {
                display: flex;
                gap: 12px;
            }

            .modal-btn {
                flex: 1;
                padding: 14px 20px;
                font-size: 14px;
                font-weight: 500;
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .modal-btn.stay {
                background: linear-gradient(135deg, #22c55e, #16a34a);
                border: none;
                color: #fff;
                box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            }

            .modal-btn.stay:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
            }

            .modal-btn.leave {
                background: transparent;
                border: 1px solid rgba(239, 68, 68, 0.4);
                color: #ef4444;
            }

            .modal-btn.leave:hover {
                background: rgba(239, 68, 68, 0.1);
                border-color: #ef4444;
            }
        </style>
    </head>
    <body>
        <button class="nav-btn" id="navBtn">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                />
            </svg>
            P2P Передача файла
        </button>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-icon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
                        />
                    </svg>
                </div>
                <h3>Вы уверены, что хотите выйти?</h3>
                <p>Если вы покинете страницу, то скачивание прервется</p>
                <div class="modal-buttons">
                    <button class="modal-btn leave" id="leaveBtn">
                        Перейти
                    </button>
                    <button class="modal-btn stay" id="stayBtn">
                        Остаться
                    </button>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="icon-wrapper">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
                    />
                </svg>
            </div>

            <h2>Загружаем файл</h2>
            <p class="subtitle">Установка P2P соединения...</p>

            <div class="progress">
                <div class="bar" id="bar"></div>
            </div>

            <p id="status">Ожидание файла...</p>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <div class="footer">
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                        />
                    </svg>
                    <span>P2P</span>
                </div>
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                        />
                    </svg>
                    <span>Шифрование</span>
                </div>
            </div>
        </div>

        <script src="receiver.js"></script>
        <script>
            const navBtn = document.getElementById("navBtn");
            const modalOverlay = document.getElementById("modalOverlay");
            const leaveBtn = document.getElementById("leaveBtn");
            const stayBtn = document.getElementById("stayBtn");

            navBtn.addEventListener("click", () => {
                modalOverlay.classList.add("show");
            });

            stayBtn.addEventListener("click", () => {
                modalOverlay.classList.remove("show");
            });

            leaveBtn.addEventListener("click", () => {
                window.location.href = "https://xhackerfinnx-file-transfer-036b.twc1.net/";
            });

            modalOverlay.addEventListener("click", (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove("show");
                }
            });
        </script>
    </body>
</html>
