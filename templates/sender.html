<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/static/css/file/sender.css" />
        <title>P2P Передача файла</title>
    </head>
    <body>
        <button class="nav-btn" id="navBtn">
            <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                stroke-width="2"
                stroke="currentColor"
            >
                <path
                    d="M12 11H12.01M8 11H8.01M16 11H16.01M12.2896 17.9984C18.0965 17.9343 21 15.9189 21 11C21 6 18 4 12 4C6 4 3 6 3 11C3 14.0771 4.13623 16.018 6.40868 17.0557L5 21L12.2896 17.9984Z"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                />
            </svg>

            P2P Чат
        </button>
        <div class="container">
            <div class="logo">🔐</div>
            <h2>Передача файла</h2>
            <p class="subtitle">Безопасная P2P передача файлов</p>

            <div id="drop">
                <div class="drop-icon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
                        />
                    </svg>
                </div>
                <div class="drop-text">Перетащите файл сюда</div>
                <div class="drop-hint">или нажмите для выбора</div>
            </div>

            <input type="file" id="fileInput" style="display: none" />

            <select id="time">
                <option value="5">Ссылка активна 5 минут</option>
                <option value="10" selected>Ссылка активна 10 минут</option>
                <option value="15">Ссылка активна 15 минут</option>
                <option value="30">Ссылка активна 30 минут</option>
            </select>

            <button onclick="create()" style="margin-top: 20px">
                Создать ссылку
            </button>

            <p id="link"></p>
            <p class="link-hint">Нажмите на ссылку, чтобы скопировать</p>

            <div class="toast" id="toast">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                </svg>
                Ссылка скопирована
            </div>

            <div class="progress">
                <div class="bar" id="bar"></div>
            </div>

            <p id="status"></p>

            <div class="footer">
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                        />
                    </svg>
                    <span>Сквозное шифрование</span>
                </div>
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                        />
                    </svg>
                    <span>P2P</span>
                </div>
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                        />
                    </svg>
                    <span>Без хранения</span>
                </div>
            </div>
            <button class="refresh-btn" onclick="location.reload()">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"
                    />
                </svg>
                Обновить
            </button>
        </div>

        <script src="/static/js/file/sender.js"></script>

        <script>
            document
                .getElementById("link")
                .addEventListener("click", function () {
                    const text = this.innerText.trim();
                    if (!text) return;

                    const toast = document.getElementById("toast");

                    navigator.clipboard.writeText(text).then(() => {
                        this.style.transition = "all 0.3s";
                        this.style.background = "rgba(59, 130, 246, 0.25)";
                        this.style.borderColor = "#3b82f6";

                        toast.classList.add("show");

                        setTimeout(() => {
                            this.style.background = "rgba(15, 15, 25, 0.6)";
                            this.style.borderColor = "rgba(100, 116, 139, 0.2)";
                        }, 800);

                        setTimeout(() => {
                            toast.classList.remove("show");
                        }, 2000);
                    });
                });
        </script>
        <script>
            const navBtn = document.getElementById("navBtn");
            navBtn.addEventListener("click", () => {
                const baseUrl = window.location.origin;
                window.open(baseUrl + "/chat", "_blank");
            });
        </script>
    </body>
</html>
