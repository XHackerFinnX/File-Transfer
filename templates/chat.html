<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <meta name="theme-color" content="#0a0a0f" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <link rel="stylesheet" href="/static/css/chat/chat.css" />
        <title>P2P Чат</title>
    </head>
    <body>
        <div class="container" id="app">
            <!-- LOBBY -->
            <div id="lobby">
                <div class="header">
                    <div class="header-logo">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                            />
                        </svg>
                    </div>
                    <div class="header-info">
                        <div class="header-title">P2P Чат</div>
                        <div class="header-subtitle">
                            <span class="status-dot"></span>
                            Шифрованное соединение
                        </div>
                    </div>
                    <button
                        class="header-menu-btn"
                        id="servicesMenuBtn"
                        aria-label="Меню сервисов"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M3.29701 5.2338C3.52243 4.27279 4.27279 3.52243 5.2338 3.29701V3.29701C6.06663 3.10165 6.93337 3.10165 7.7662 3.29701V3.29701C8.72721 3.52243 9.47757 4.27279 9.70299 5.2338V5.2338C9.89835 6.06663 9.89835 6.93337 9.70299 7.7662V7.7662C9.47757 8.72721 8.72721 9.47757 7.7662 9.70299V9.70299C6.93337 9.89835 6.06663 9.89835 5.2338 9.70299V9.70299C4.27279 9.47757 3.52243 8.72721 3.29701 7.7662V7.7662C3.10166 6.93337 3.10166 6.06663 3.29701 5.2338V5.2338Z"
                                stroke="#94a3b8"
                                stroke-width="1.5"
                            />
                            <path
                                d="M3.29701 16.2338C3.52243 15.2728 4.27279 14.5224 5.2338 14.297V14.297C6.06663 14.1017 6.93337 14.1017 7.7662 14.297V14.297C8.72721 14.5224 9.47757 15.2728 9.70299 16.2338V16.2338C9.89835 17.0666 9.89835 17.9334 9.70299 18.7662V18.7662C9.47757 19.7272 8.72721 20.4776 7.7662 20.703V20.703C6.93337 20.8983 6.06663 20.8983 5.2338 20.703V20.703C4.27279 20.4776 3.52243 19.7272 3.29701 18.7662V18.7662C3.10166 17.9334 3.10166 17.0666 3.29701 16.2338V16.2338Z"
                                stroke="#3b82f6"
                                stroke-width="1.5"
                            />
                            <path
                                d="M14.297 5.2338C14.5224 4.27279 15.2728 3.52243 16.2338 3.29701V3.29701C17.0666 3.10165 17.9334 3.10165 18.7662 3.29701V3.29701C19.7272 3.52243 20.4776 4.27279 20.703 5.2338V5.2338C20.8983 6.06663 20.8983 6.93337 20.703 7.7662V7.7662C20.4776 8.72721 19.7272 9.47757 18.7662 9.70299V9.70299C17.9334 9.89835 17.0666 9.89835 16.2338 9.70299V9.70299C15.2728 9.47757 14.5224 8.72721 14.297 7.7662V7.7662C14.1017 6.93337 14.1017 6.06663 14.297 5.2338V5.2338Z"
                                stroke="#94a3b8"
                                stroke-width="1.5"
                            />
                            <path
                                d="M14.297 16.2338C14.5224 15.2728 15.2728 14.5224 16.2338 14.297V14.297C17.0666 14.1017 17.9334 14.1017 18.7662 14.297V14.297C19.7272 14.5224 20.4776 15.2728 20.703 16.2338V16.2338C20.8983 17.0666 20.8983 17.9334 20.703 18.7662V18.7662C20.4776 19.7272 19.7272 20.4776 18.7662 20.703V20.703C17.9334 20.8983 17.0666 20.8983 16.2338 20.703V20.703C15.2728 20.4776 14.5224 19.7272 14.297 18.7662V18.7662C14.1017 17.9334 14.1017 17.0666 14.297 16.2338V16.2338Z"
                                stroke="#94a3b8"
                                stroke-width="1.5"
                            />
                        </svg>
                    </button>

                    <!-- Выпадающее меню сервисов -->
                    <div class="services-dropdown" id="servicesDropdown">
                        <div class="services-dropdown-header">
                            <h3 class="services-dropdown-title">P2P Сервисы</h3>
                            <button
                                class="services-dropdown-close"
                                id="servicesCloseBtn"
                                aria-label="Закрыть меню"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M6 18L18 6M6 6l12 12"
                                    />
                                </svg>
                            </button>
                        </div>
                        <div class="services-list" id="servicesList">
                            <!-- Сервисы будут добавлены динамически через JS -->
                        </div>
                    </div>
                </div>

                <div class="lobby-content">
                    <div class="input-group">
                        <label class="input-label">Ваш никнейм</label>
                        <input
                            id="nickname"
                            class="input-field"
                            placeholder="Введите никнейм"
                            value="Аноним"
                            maxlength="20"
                            onblur="setNickname()"
                        />
                    </div>

                    <div class="input-row">
                        <input
                            id="roomTitle"
                            class="input-field"
                            placeholder="Название нового чата"
                        />
                        <button class="btn-primary" onclick="createRoom()">
                            Создать
                        </button>
                    </div>

                    <div class="search-wrapper">
                        <svg
                            class="search-icon"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
                            />
                        </svg>
                        <input
                            id="search"
                            class="search-input"
                            placeholder="Поиск чатов..."
                            oninput="filterUsers()"
                        />
                    </div>

                    <div class="section-header">
                        <span class="section-title">Доступные чаты</span>
                        <span class="section-badge" id="count">0</span>
                    </div>

                    <div class="rooms-list" id="usersList">
                        <div class="empty-state">
                            <div class="empty-icon">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"
                                    />
                                </svg>
                            </div>
                            <div class="empty-title">Пока нет чатов</div>
                            <div class="empty-text">
                                Создайте первый чат или дождитесь других
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CHAT VIEW -->
            <div id="chat">
                <div class="chat-header">
                    <button class="btn-back" onclick="exitChat()">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M15.75 19.5L8.25 12l7.5-7.5"
                            />
                        </svg>
                    </button>
                    <div class="chat-peer">
                        <div class="chat-peer-name" id="chatTitle">Чат</div>
                        <div class="chat-peer-status">
                            <span class="status-dot"></span>
                            В сети
                        </div>
                    </div>
                    <button
                        class="btn-call"
                        onclick="alert('Звонки скоро будут доступны!')"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"
                            />
                        </svg>
                    </button>
                </div>

                <div id="messages" class="messages"></div>

                <div class="message-input-wrapper">
                    <button class="btn-emoji" id="emojiBtn">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M15.182 15.182a4.5 4.5 0 01-6.364 0M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75zm-.375 0h.008v.015h-.008V9.75zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75zm-.375 0h.008v.015h-.008V9.75z"
                            />
                        </svg>
                    </button>

                    <div class="emoji-picker" id="emojiPicker">
                        <div class="emoji-categories">
                            <button
                                class="emoji-cat-btn active"
                                data-cat="smileys"
                            >
                                Смайлы
                            </button>
                            <button class="emoji-cat-btn" data-cat="gestures">
                                Жесты
                            </button>
                            <button class="emoji-cat-btn" data-cat="hearts">
                                Сердца
                            </button>
                            <button class="emoji-cat-btn" data-cat="animals">
                                Животные
                            </button>
                            <button class="emoji-cat-btn" data-cat="food">
                                Еда
                            </button>
                            <button class="emoji-cat-btn" data-cat="objects">
                                Объекты
                            </button>
                        </div>
                        <div class="emoji-search">
                            <input
                                type="text"
                                placeholder="Поиск эмодзи..."
                                id="emojiSearch"
                            />
                        </div>
                        <div class="emoji-grid" id="emojiGrid"></div>
                    </div>

                    <textarea
                        id="messageInput"
                        class="message-input"
                        placeholder="Сообщение"
                        rows="1"
                        style="height: 34px"
                    ></textarea>
                    <button class="btn-send" id="sendBtn">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"
                            />
                        </svg>
                    </button>
                </div>

                <div id="statusChat" class="chat-status"></div>
            </div>
        </div>

        <script src="/static/js/chat/utils.js"></script>
        <script src="/static/js/chat/emoji.js"></script>
        <script src="/static/js/chat/websocket.js"></script>
        <script src="/static/js/chat/webrtc.js"></script>
    </body>
</html>
