<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/static/css/chat/chat.css" />
        <title>P2P Чат</title>
    </head>
    <body>
        <button class="nav-btn" id="navBtn">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                />
            </svg>
            P2P Передача файла
        </button>
        <div class="container" id="app">
            <!-- LOBBY -->
            <div id="lobby">
                <div class="header">
                    <div class="header-logo">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                            />
                        </svg>
                    </div>
                    <div class="header-info">
                        <div class="header-title">P2P Чат</div>
                        <div class="header-subtitle">
                            <span class="status-dot"></span>
                            Шифрованное соединение
                        </div>
                    </div>
                </div>

                <div class="lobby-content">
                    <div class="input-group">
                        <label class="input-label">Ваш никнейм</label>
                        <input
                            id="nickname"
                            class="input-field"
                            placeholder="Введите никнейм"
                            value="Аноним"
                            maxlength="20"
                            onblur="setNickname()"
                        />
                    </div>

                    <div class="input-row">
                        <input
                            id="roomTitle"
                            class="input-field"
                            placeholder="Название нового чата"
                        />
                        <button class="btn-primary" onclick="createRoom()">
                            Создать
                        </button>
                    </div>

                    <div class="search-wrapper">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
                            />
                        </svg>
                        <input
                            id="search"
                            class="search-input"
                            placeholder="Поиск чатов..."
                            oninput="filterUsers()"
                        />
                    </div>

                    <div class="section-header">
                        <span class="section-title">Доступные чаты</span>
                        <span class="section-badge" id="count">0</span>
                    </div>

                    <div class="rooms-list" id="usersList">
                        <div class="empty-state">
                            <div class="empty-icon">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"
                                    />
                                </svg>
                            </div>
                            <div class="empty-title">Пока нет чатов</div>
                            <div class="empty-text">
                                Создайте первый чат или дождитесь других
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CHAT VIEW -->
            <div id="chat">
                <div class="chat-header">
                    <button class="btn-back" onclick="exitChat()">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M15.75 19.5L8.25 12l7.5-7.5"
                            />
                        </svg>
                    </button>
                    <div class="chat-peer">
                        <div class="chat-peer-name" id="chatTitle">Чат</div>
                        <div class="chat-peer-status">
                            <span class="status-dot"></span>
                            В сети
                        </div>
                    </div>
                    <button
                        class="btn-call"
                        onclick="alert('Звонки скоро будут доступны!')"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"
                            />
                        </svg>
                    </button>
                </div>

                <div id="messages" class="messages"></div>

                <div class="message-input-wrapper">
                    <button class="btn-emoji" id="emojiBtn">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M15.182 15.182a4.5 4.5 0 01-6.364 0M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75zm-.375 0h.008v.015h-.008V9.75zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75zm-.375 0h.008v.015h-.008V9.75z"
                            />
                        </svg>
                    </button>

                    <div class="emoji-picker" id="emojiPicker">
                        <div class="emoji-categories">
                            <button
                                class="emoji-cat-btn active"
                                data-cat="smileys"
                            >
                                Смайлы
                            </button>
                            <button class="emoji-cat-btn" data-cat="gestures">
                                Жесты
                            </button>
                            <button class="emoji-cat-btn" data-cat="hearts">
                                Сердца
                            </button>
                            <button class="emoji-cat-btn" data-cat="animals">
                                Животные
                            </button>
                            <button class="emoji-cat-btn" data-cat="food">
                                Еда
                            </button>
                            <button class="emoji-cat-btn" data-cat="objects">
                                Объекты
                            </button>
                        </div>
                        <div class="emoji-search">
                            <input
                                type="text"
                                placeholder="Поиск эмодзи..."
                                id="emojiSearch"
                            />
                        </div>
                        <div class="emoji-grid" id="emojiGrid"></div>
                    </div>

                    <textarea
                        id="messageInput"
                        class="message-input"
                        placeholder="Напишите сообщение..."
                        rows="1"
                    ></textarea>
                    <button class="btn-send" id="sendBtn">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"
                            />
                        </svg>
                    </button>
                </div>

                <div id="statusChat" class="chat-status"></div>
            </div>
        </div>

        <script src="/static/js/chat/utils.js"></script>
        <script src="/static/js/chat/emoji.js"></script>
        <script src="/static/js/chat/websocket.js"></script>
        <script src="/static/js/chat/webrtc.js"></script>
    </body>
</html>
