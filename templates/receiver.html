<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/static/css/file/receiver.css" />
        <title>P2P Скачивание файла</title>
    </head>
    <body>
        <button class="nav-btn" id="navBtn">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                />
            </svg>
            P2P Передача файла
        </button>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-icon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
                        />
                    </svg>
                </div>
                <h3>Вы уверены, что хотите выйти?</h3>
                <p>Если вы покинете страницу, то скачивание прервется</p>
                <div class="modal-buttons">
                    <button class="modal-btn leave" id="leaveBtn">
                        Перейти
                    </button>
                    <button class="modal-btn stay" id="stayBtn">
                        Остаться
                    </button>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="icon-wrapper">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
                    />
                </svg>
            </div>

            <h2>Загружаем файл</h2>
            <p class="subtitle">Установка P2P соединения...</p>

            <div class="progress">
                <div class="bar" id="bar"></div>
            </div>

            <p id="status">Ожидание файла...</p>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <div class="footer">
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                        />
                    </svg>
                    <span>P2P</span>
                </div>
                <div class="footer-item">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                        />
                    </svg>
                    <span>Шифрование</span>
                </div>
            </div>
        </div>

        <script src="/static/js/file/receiver.js"></script>
        <script>
            const navBtn = document.getElementById("navBtn");
            const modalOverlay = document.getElementById("modalOverlay");
            const leaveBtn = document.getElementById("leaveBtn");
            const stayBtn = document.getElementById("stayBtn");

            navBtn.addEventListener("click", () => {
                modalOverlay.classList.add("show");
            });

            stayBtn.addEventListener("click", () => {
                modalOverlay.classList.remove("show");
            });

            leaveBtn.addEventListener("click", () => {
                window.location.href = "https://2p2p.ru/file/";
            });

            modalOverlay.addEventListener("click", (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove("show");
                }
            });
        </script>
    </body>
</html>
